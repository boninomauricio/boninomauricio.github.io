<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>priscila</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            perspective: 1200px;
            cursor: pointer;
        }

        #heart-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .text-unit {
            position: absolute;
            color: #ff0000;
            font-weight: bold;
            font-size: 1.3rem;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff0000, 0 0 20px rgba(255, 0, 0, 0.5);
            user-select: none;
            will-change: transform;
        }

        .explosion-heart {
            position: absolute;
            color: #ff3333;
            font-size: 1.5rem;
            user-select: none;
            pointer-events: none;
            will-change: transform, opacity;
            transform: translate(-50%, -50%); 
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const text = "priscila";
        const totalElements = 90;
        const elements = [];

        function init() {
            for (let i = 0; i < totalElements; i++) {
                const span = document.createElement('span');
                span.className = 'text-unit';
                span.innerText = text;
                container.appendChild(span);
                elements.push({
                    el: span,
                    angle: (i / totalElements) * Math.PI * 2
                });
            }
        }

        let rotation = 0;
        function draw() {
            rotation += 0.004; 
            const width = window.innerWidth / 2;
            const height = window.innerHeight / 2;

            elements.forEach((item) => {
                const t = item.angle + rotation;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                x *= 18;
                y *= 18;

                const perspectiveAngle = -0.7;
                const xFinal = x * Math.cos(perspectiveAngle); 
                const zFinal = x * Math.sin(perspectiveAngle); 
                const yFinal = y;

                const depthEffect = (zFinal + 200) / 400; 
                
                item.el.style.transform = `
                    translate3d(${width + xFinal}px, ${height + yFinal}px, ${zFinal}px)
                    rotateY(${-perspectiveAngle}rad)
                    scale(${0.7 + depthEffect * 0.5})
                `;
                item.el.style.opacity = 0.2 + depthEffect * 0.8;
            });
            requestAnimationFrame(draw);
        }
        
        function createExplosion(x, y) {
            const numberOfHearts = 15;
            const containerBody = document.body;

            for (let i = 0; i < numberOfHearts; i++) {
                const heart = document.createElement('span');
                heart.className = 'explosion-heart';
                heart.innerText = '<3';
                
                heart.style.left = `${x}px`;
                heart.style.top = `${y}px`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity;

                heart.style.transition = 'transform 1s ease-out, opacity 1s ease-out';
                
                containerBody.appendChild(heart);
                heart.offsetHeight; 
                const finalScale = 0.3 + Math.random() * 0.7;
                heart.style.transform = `translate(-50%, -50%) translate3d(${destinationX}px, ${destinationY}px, 0px) scale(${finalScale})`;
                heart.style.opacity = '0';

                setTimeout(() => {
                    heart.remove();
                }, 1000);
            }
        }

        document.body.addEventListener('click', (event) => {
            createExplosion(event.clientX, event.clientY);
        });

        init();
        draw();
        window.addEventListener('resize', () => {
            location.reload();
        });
    </script>
</body>
</html>
